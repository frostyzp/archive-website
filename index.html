<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What We Tell AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: 'News Plantin';
        src: url('/NewsPlantin.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Reckless Italic';
        src: url('/recklessItalic.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OT Brut Mono';
        src: url('/OTBrut-RegularMono.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      :root {
        --font-primary: 'News Plantin', Georgia, serif;
        --font-display: 'News Plantin', Georgia, serif;
        --font-mono: 'Fragment Mono', 'OT Brut Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: var(--font-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
